<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Heapify Up / Down 단독 시각화</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#202433; --text:#eef2ff; --muted:#a9b2c7;
    --line:#59627a; --good:#67e8f9; --bad:#fca5a5; --hot:#fde68a; --node:#2b3145;
    --swap:#c4b5fd; --ok:#86efac;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(circle at top,#1e2433,#0f1117 55%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif}
  header{padding:18px 20px 10px;text-align:center}
  h1{font-size:24px;margin:0 0 6px}
  .sub{color:var(--muted);font-size:14px}
  main{display:grid;grid-template-columns:310px 1fr;gap:16px;padding:14px 18px 22px;max-width:1200px;margin:auto}
  .panel{background:rgba(23,26,35,.9);border:1px solid #2b3042;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
  .controls{padding:16px}
  .section{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #2d3348}
  .section:last-child{border-bottom:0}
  .label{font-size:13px;color:var(--muted);margin-bottom:8px}
  button{width:100%;border:0;border-radius:13px;padding:12px 10px;margin:6px 0;background:#293149;color:var(--text);font-weight:750;cursor:pointer;transition:.18s transform,.18s background}
  button:hover{transform:translateY(-1px);background:#35405e}
  button.active{background:#53628d;outline:2px solid var(--good)}
  button.primary{background:#2f6f83}
  button.primary:hover{background:#38839a}
  .speed{width:100%}
  .stage{padding:16px;min-height:720px;position:relative;overflow:hidden}
  .legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px}
  .pill{font-size:12px;color:#dbe3ff;background:#22283a;border:1px solid #343b52;border-radius:999px;padding:6px 10px}
  .pill .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:-1px}
  .treeWrap{height:420px;position:relative;margin-top:8px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid #272d3f}
  svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .edge{stroke:var(--line);stroke-width:3;opacity:.7}
  .edge.hot{stroke:var(--hot);opacity:1;stroke-width:5}
  .node{position:absolute;width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:var(--node);border:3px solid #58617d;color:white;font-weight:900;font-size:18px;box-shadow:0 10px 24px rgba(0,0,0,.35);
    transition:all .55s cubic-bezier(.2,.8,.2,1)}
  .node small{display:block;font-size:10px;color:#cbd5e1;font-weight:700;margin-top:2px}
  .node .inner{text-align:center;line-height:1.05}
  .node.parent{border-color:var(--good);box-shadow:0 0 0 6px rgba(103,232,249,.13),0 10px 24px rgba(0,0,0,.35)}
  .node.current{border-color:var(--hot);background:#4a3d21;box-shadow:0 0 0 7px rgba(253,230,138,.14),0 10px 24px rgba(0,0,0,.35)}
  .node.child{border-color:#93c5fd}
  .node.swap{border-color:var(--swap);background:#3a2d5f;animation:pulse .8s infinite alternate}
  .node.ok{border-color:var(--ok);background:#20472d}
  .node.missing{opacity:.16;border-style:dashed;background:#222}
  @keyframes pulse{from{transform:scale(1)}to{transform:scale(1.07)}}
  .array{display:flex;justify-content:center;gap:8px;margin:16px 0 8px;flex-wrap:wrap}
  .cell{min-width:58px;padding:9px 8px;border-radius:12px;background:#22283a;border:2px solid #3b435a;text-align:center;font-weight:850;transition:.35s}
  .cell .idx{display:block;font-size:10px;color:var(--muted);font-weight:650;margin-top:3px}
  .cell.hot{border-color:var(--hot);background:#4a3d21}
  .cell.swap{border-color:var(--swap);background:#3a2d5f}
  .cell.ok{border-color:var(--ok);background:#20472d}
  .caption{min-height:92px;margin:12px auto 0;max-width:760px;text-align:center;background:#111521;border:1px solid #2d344b;border-radius:16px;padding:14px}
  .caption .big{font-size:23px;font-weight:950;margin-bottom:6px}
  .caption .small{font-size:14px;color:var(--muted)}
  .compare{display:grid;grid-template-columns:1fr 70px 1fr;gap:10px;align-items:center;max-width:560px;margin:14px auto}
  .compareBox{background:#202638;border:2px solid #3b435a;border-radius:16px;padding:14px;text-align:center;font-weight:900}
  .compareBox.hot{border-color:var(--hot)}
  .sign{text-align:center;font-size:30px;font-weight:950;color:var(--hot)}
  .caseTitle{font-size:18px;font-weight:950;text-align:center;margin:4px 0 10px}
  .note{font-size:12px;color:var(--muted);line-height:1.55}
  @media(max-width:850px){main{grid-template-columns:1fr}.stage{min-height:660px}.treeWrap{height:360px}.node{width:62px;height:62px;font-size:16px}}
</style>
</head>
<body>
<header>
  <h1>Heapify Up / Down만 보기</h1>
  <div class="sub">배열로 저장하지만, 머릿속에서는 완전 이진트리처럼 비교합니다.</div>
</header>

<main>
  <aside class="panel controls">
    <div class="section">
      <div class="label">Heapify Up</div>
      <button data-case="up1">UP 1 · 부모보다 작음 → swap</button>
      <button data-case="up2">UP 2 · 부모보다 큼 → 멈춤</button>
      <button data-case="up3">UP 3 · 루트까지 계속 올라감</button>
      <button data-case="up4">UP 4 · 이미 루트</button>
    </div>

    <div class="section">
      <div class="label">Heapify Down · 자식 경우의 수</div>
      <button data-case="down0">DOWN 0 · 자식 없음</button>
      <button data-case="down1">DOWN 1 · 왼쪽 자식만 있음</button>
      <button data-case="down2">DOWN 2 · 양쪽 자식 있음 · 왼쪽이 작음</button>
      <button data-case="down3">DOWN 3 · 양쪽 자식 있음 · 오른쪽이 작음</button>
      <button data-case="down4">DOWN 4 · 자식 둘 다 부모보다 큼 → 멈춤</button>
      <button data-case="down5">DOWN 5 · 여러 번 내려감</button>
    </div>

    <div class="section">
      <div class="label">재생</div>
      <button class="primary" id="play">▶ 다시 재생</button>
      <button id="step">한 단계씩 보기</button>
      <div class="label" style="margin-top:12px">속도</div>
      <input id="speed" class="speed" type="range" min="350" max="1300" value="850" />
    </div>

    <div class="note">
      MinHeap 기준입니다. 작은 값이 위로 갑니다.<br>
      Down에서는 “부모 · 왼쪽 · 오른쪽 중 제일 작은 노드”를 고릅니다.
    </div>
  </aside>

  <section class="panel stage">
    <div class="legend">
      <span class="pill"><span class="dot" style="background:var(--hot)"></span>현재 노드</span>
      <span class="pill"><span class="dot" style="background:var(--good)"></span>부모 / 선택됨</span>
      <span class="pill"><span class="dot" style="background:#93c5fd"></span>자식 후보</span>
      <span class="pill"><span class="dot" style="background:var(--swap)"></span>swap</span>
    </div>

    <div class="caseTitle" id="caseTitle"></div>
    <div class="treeWrap" id="treeWrap">
      <svg id="edges"></svg>
      <div id="nodes"></div>
    </div>

    <div class="array" id="array"></div>

    <div class="compare" id="compare">
      <div class="compareBox" id="leftBox">-</div>
      <div class="sign" id="sign">?</div>
      <div class="compareBox" id="rightBox">-</div>
    </div>

    <div class="caption">
      <div class="big" id="captionBig"></div>
      <div class="small" id="captionSmall"></div>
    </div>
  </section>
</main>

<script>
const positions = [
  [50, 12], [28, 34], [72, 34], [17, 60], [39, 60], [61, 60], [83, 60], [11, 83], [23, 83], [33,83], [45,83]
];

const cases = {
  up1: {
    title:"UP 1 · 부모보다 작으면 위로",
    mode:"up",
    arr:[3, 8, 5, 12, 6],
    start:4,
    steps:[
      ["현재 노드 선택", "새 값 6은 index 4. 부모 index는 (4-1)//2 = 1.", [4], [1], "6", "<", "8"],
      ["부모와 비교", "6 < 8 이므로 MinHeap 규칙이 깨졌습니다.", [4], [1], "6", "<", "8"],
      ["swap", "작은 값 6이 부모 자리로 올라갑니다.", [4,1], [], "6", "↔", "8", [4,1]],
      ["완료", "이제 부모 3보다 6이 크므로 멈춥니다.", [1], [0], "6", ">", "3", null, [3,6,5,12,8]]
    ]
  },
  up2: {
    title:"UP 2 · 부모보다 크면 멈춤",
    mode:"up",
    arr:[3, 6, 5, 12, 8],
    start:4,
    steps:[
      ["현재 노드 선택", "index 4의 값 8. 부모는 index 1의 값 6.", [4], [1], "8", "?", "6"],
      ["비교", "8은 부모 6보다 작지 않습니다.", [4], [1], "8", ">", "6"],
      ["완료", "부모가 더 작으므로 힙 규칙이 이미 맞습니다.", [4], [1], "멈춤", "✓", ""]
    ]
  },
  up3: {
    title:"UP 3 · 루트까지 계속 올라감",
    mode:"up",
    arr:[4, 7, 6, 9, 8, 10, 3],
    start:6,
    steps:[
      ["현재 노드 선택", "새 값 3은 index 6. 부모는 index 2의 값 6.", [6], [2], "3", "<", "6"],
      ["swap 1", "3 < 6 이므로 swap합니다.", [6,2], [], "3", "↔", "6", [6,2]],
      ["위로 이동", "3은 index 2가 되었습니다. 부모는 root 4입니다.", [2], [0], "3", "<", "4", null, [4,7,3,9,8,10,6]],
      ["swap 2", "3 < 4 이므로 또 swap합니다.", [2,0], [], "3", "↔", "4", [2,0]],
      ["완료", "3이 root가 되었습니다.", [0], [], "root", "✓", "", null, [3,7,4,9,8,10,6]]
    ]
  },
  up4: {
    title:"UP 4 · 이미 루트면 끝",
    mode:"up",
    arr:[3],
    start:0,
    steps:[
      ["현재 노드 선택", "index 0은 root입니다.", [0], [], "index 0", "=", "root"],
      ["완료", "부모가 없으므로 heapify up은 바로 끝납니다.", [0], [], "부모 없음", "✓", ""]
    ]
  },

  down0: {
    title:"DOWN 0 · 자식이 없으면 끝",
    mode:"down",
    arr:[3],
    start:0,
    steps:[
      ["현재 노드 선택", "root만 있습니다.", [0], [], "3", "?", "자식 없음"],
      ["완료", "왼쪽 자식도 오른쪽 자식도 없으므로 내려갈 곳이 없습니다.", [0], [], "멈춤", "✓", ""]
    ]
  },
  down1: {
    title:"DOWN 1 · 왼쪽 자식만 있음",
    mode:"down",
    arr:[8, 5],
    start:0,
    steps:[
      ["현재 노드 선택", "부모 8, 왼쪽 자식 5. 오른쪽 자식은 없습니다.", [0], [1], "8", "vs", "5"],
      ["왼쪽과 비교", "5가 8보다 작으므로 swap합니다.", [0,1], [], "8", "↔", "5", [0,1]],
      ["완료", "5가 root가 되었습니다.", [1], [], "완료", "✓", "", null, [5,8]]
    ]
  },
  down2: {
    title:"DOWN 2 · 양쪽 자식 · 왼쪽이 제일 작음",
    mode:"down",
    arr:[9, 4, 7],
    start:0,
    steps:[
      ["현재 노드 선택", "부모 9, 왼쪽 4, 오른쪽 7.", [0], [1,2], "9", "vs", "4 / 7"],
      ["작은 자식 선택", "자식 중 더 작은 값은 왼쪽 4입니다.", [0], [1,2], "왼쪽 4", "<", "오른쪽 7"],
      ["swap", "4가 부모 9보다 작으므로 swap합니다.", [0,1], [], "9", "↔", "4", [0,1]],
      ["완료", "9는 leaf가 되어 멈춥니다.", [1], [], "완료", "✓", "", null, [4,9,7]]
    ]
  },
  down3: {
    title:"DOWN 3 · 양쪽 자식 · 오른쪽이 제일 작음",
    mode:"down",
    arr:[9, 7, 4],
    start:0,
    steps:[
      ["현재 노드 선택", "부모 9, 왼쪽 7, 오른쪽 4.", [0], [1,2], "9", "vs", "7 / 4"],
      ["작은 자식 선택", "자식 중 더 작은 값은 오른쪽 4입니다.", [0], [1,2], "오른쪽 4", "<", "왼쪽 7"],
      ["swap", "4가 부모 9보다 작으므로 swap합니다.", [0,2], [], "9", "↔", "4", [0,2]],
      ["완료", "9는 leaf가 되어 멈춥니다.", [2], [], "완료", "✓", "", null, [4,7,9]]
    ]
  },
  down4: {
    title:"DOWN 4 · 자식 둘 다 부모보다 크면 멈춤",
    mode:"down",
    arr:[3, 7, 5],
    start:0,
    steps:[
      ["현재 노드 선택", "부모 3, 왼쪽 7, 오른쪽 5.", [0], [1,2], "3", "vs", "7 / 5"],
      ["작은 자식 선택", "자식 중 더 작은 값은 5입니다.", [0], [1,2], "5", "<", "7"],
      ["완료", "가장 작은 자식 5도 부모 3보다 큽니다. swap하지 않습니다.", [0], [2], "3", "<", "5"]
    ]
  },
  down5: {
    title:"DOWN 5 · 여러 번 내려감",
    mode:"down",
    arr:[12, 4, 5, 8, 9, 6, 7],
    start:0,
    steps:[
      ["현재 노드 선택", "부모 12, 자식 4와 5.", [0], [1,2], "12", "vs", "4 / 5"],
      ["작은 자식 선택", "더 작은 자식은 4입니다.", [0], [1], "4", "<", "5"],
      ["swap 1", "4 < 12 이므로 swap합니다.", [0,1], [], "12", "↔", "4", [0,1]],
      ["아래에서 계속", "12는 index 1로 내려왔습니다. 자식은 8과 9.", [1], [3,4], "12", "vs", "8 / 9", null, [4,12,5,8,9,6,7]],
      ["작은 자식 선택", "더 작은 자식은 8입니다.", [1], [3], "8", "<", "9"],
      ["swap 2", "8 < 12 이므로 또 swap합니다.", [1,3], [], "12", "↔", "8", [1,3]],
      ["완료", "12는 leaf가 되어 멈춥니다.", [3], [], "완료", "✓", "", null, [4,8,5,12,9,6,7]]
    ]
  }
};

let currentCase = "up1";
let stepIndex = 0;
let timer = null;
let arrState = [...cases[currentCase].arr];

const nodesEl = document.getElementById("nodes");
const edgesEl = document.getElementById("edges");
const arrayEl = document.getElementById("array");
const titleEl = document.getElementById("caseTitle");
const bigEl = document.getElementById("captionBig");
const smallEl = document.getElementById("captionSmall");
const leftBox = document.getElementById("leftBox");
const rightBox = document.getElementById("rightBox");
const signEl = document.getElementById("sign");
const speedEl = document.getElementById("speed");

function nodeLabel(v){
  if(v === null || v === undefined) return "";
  return String(v);
}
function draw(arr, step){
  titleEl.textContent = cases[currentCase].title;
  nodesEl.innerHTML = "";
  edgesEl.innerHTML = "";
  arrayEl.innerHTML = "";

  const hot = step?.[2] || [];
  const parent = step?.[3] || [];
  const swaps = step?.[7] || [];
  const finalArr = step?.[8];
  const displayArr = finalArr || arrState;

  for(let i=0;i<displayArr.length;i++){
    const left=2*i+1, right=2*i+2;
    if(left<displayArr.length) edge(i,left, swaps.includes(i)&&swaps.includes(left));
    if(right<displayArr.length) edge(i,right, swaps.includes(i)&&swaps.includes(right));
  }

  for(let i=0;i<displayArr.length;i++){
    const [x,y] = positions[i] || [50,85];
    const div = document.createElement("div");
    div.className = "node";
    if(hot.includes(i)) div.classList.add("current");
    if(parent.includes(i)) div.classList.add("parent");
    if(swaps.includes(i)) div.classList.add("swap");
    if(step?.[0] === "완료" && hot.includes(i)) div.classList.add("ok");
    div.style.left = `calc(${x}% - 38px)`;
    div.style.top = `calc(${y}% - 38px)`;
    div.innerHTML = `<div class="inner">${nodeLabel(displayArr[i])}<small>i=${i}</small></div>`;
    nodesEl.appendChild(div);
  }

  for(let i=0;i<displayArr.length;i++){
    const c = document.createElement("div");
    c.className = "cell";
    if(hot.includes(i) || parent.includes(i)) c.classList.add("hot");
    if(swaps.includes(i)) c.classList.add("swap");
    c.innerHTML = `${nodeLabel(displayArr[i])}<span class="idx">${i}</span>`;
    arrayEl.appendChild(c);
  }

  if(step){
    bigEl.textContent = step[0];
    smallEl.textContent = step[1];
    leftBox.textContent = step[4] ?? "-";
    signEl.textContent = step[5] ?? "?";
    rightBox.textContent = step[6] ?? "-";
    leftBox.className = "compareBox hot";
    rightBox.className = "compareBox hot";
  }
}
function edge(i,j,hot){
  const [x1,y1]=positions[i], [x2,y2]=positions[j];
  const line = document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1", x1+"%");
  line.setAttribute("y1", y1+"%");
  line.setAttribute("x2", x2+"%");
  line.setAttribute("y2", y2+"%");
  line.setAttribute("class", hot ? "edge hot" : "edge");
  edgesEl.appendChild(line);
}
function applySwap(step){
  const swaps = step?.[7];
  if(swaps && swaps.length===2){
    const [a,b]=swaps;
    [arrState[a], arrState[b]] = [arrState[b], arrState[a]];
  }
  if(step?.[8]){
    arrState = [...step[8]];
  }
}
function renderStep(){
  const step = cases[currentCase].steps[stepIndex];
  draw(arrState, step);
}
function nextStep(){
  const steps = cases[currentCase].steps;
  const step = steps[stepIndex];
  draw(arrState, step);
  setTimeout(()=>applySwap(step), Math.max(120, Number(speedEl.value)*0.38));
  stepIndex++;
  if(stepIndex >= steps.length){
    clearInterval(timer); timer=null;
  }
}
function play(){
  clearInterval(timer);
  stepIndex = 0;
  arrState = [...cases[currentCase].arr];
  renderStep();
  timer = setInterval(nextStep, Number(speedEl.value));
  nextStep();
}
function setCase(name){
  currentCase = name;
  document.querySelectorAll("button[data-case]").forEach(b=>b.classList.toggle("active", b.dataset.case===name));
  clearInterval(timer); timer=null;
  stepIndex = 0;
  arrState = [...cases[currentCase].arr];
  renderStep();
}
document.querySelectorAll("button[data-case]").forEach(btn=>{
  btn.addEventListener("click",()=>setCase(btn.dataset.case));
});
document.getElementById("play").addEventListener("click", play);
document.getElementById("step").addEventListener("click", ()=>{
  if(stepIndex >= cases[currentCase].steps.length){
    stepIndex = 0; arrState = [...cases[currentCase].arr];
  }
  nextStep();
});
setCase("up1");
</script>
</body>
</html>
